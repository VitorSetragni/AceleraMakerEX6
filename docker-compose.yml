services:
  db2:
    image: icr.io/db2_community/db2:latest
    platform: linux/amd64
    container_name: aceleramakerex6-db2
    privileged: true
    env_file:
      - .env.db2
    ports:
      - "50000:50000"
    volumes:
      - dados_db2:/database
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2 connect to BANCO6 >/dev/null 2>&1'"]
      interval: 30s
      timeout: 10s
      retries: 20

  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aceleramakerex6-app
    depends_on:
      - db2
    environment:
      DB2_HOST: db2
      DB2_PORT: "50000"
      DB2_DATABASE: BANCO6
      DB2_USER: db2inst1
      DB2_PASSWORD: SenhaDb2@123
      LD_LIBRARY_PATH: /opt/ibm/clidriver/lib
    volumes:
      - .:/app
    working_dir: /app
    tty: true

volumes:
  dados_db2:
